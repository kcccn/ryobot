name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy main.py bots core platforms

      - name: Pytest
        run: python -m pytest
