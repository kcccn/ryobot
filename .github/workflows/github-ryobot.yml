name: github-ryobot

on:
  issues:
    types:
      - opened
      - edited
  issue_comment:
    types:
      - created
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - closed
  pull_request_review_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue/PR number to trigger bots on'
        required: false
        type: string
  schedule:
    - cron: "*/30 * * * *"

permissions:
  issues: write
  pull-requests: write
  actions: write
  contents: write

jobs:
  run-ryobot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run Bots Sequentially
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EVENT_PAYLOAD: ${{ toJson(github.event) }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RYOBOT_ALLOWED_WORKFLOWS: github-ryobot.yml
        run: |
          for bot in architect reviewer pm explorer coder; do
            echo "::group::Running $bot"
            BOT_IDENTITY=$bot python main.py || echo "::warning::$bot exited with code $?"
            echo "::endgroup::"
          done
