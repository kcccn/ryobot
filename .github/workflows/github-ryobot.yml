name: github-ryobot

on:
  issues:
    types:
      - opened
      - edited
  issue_comment:
    types:
      - created
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - closed
  pull_request_review_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue/PR number to trigger bots on'
        required: false
        type: string
  schedule:
    - cron: "*/10 * * * *"

permissions:
  issues: write
  pull-requests: write
  actions: write
  contents: write

jobs:
  run-ryobot:
    concurrency:
      group: ryobot-${{ github.repository }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run RyoBot Engine
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EVENT_PAYLOAD: ${{ toJson(github.event) }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RYOBOT_MOTIVATION_THRESHOLD: 70
          RYOBOT_FATIGUE_MIN_SECONDS: 480
          RYOBOT_FATIGUE_MAX_SECONDS: 720
          RYOBOT_INITIAL_HISTORY_COMMENT_LIMIT: 12
          RYOBOT_INITIAL_HISTORY_TOTAL_CHARS: 16000
          RYOBOT_ALLOWED_WORKFLOWS: github-ryobot.yml
        run: python main.py
